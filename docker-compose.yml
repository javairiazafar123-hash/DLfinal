version: '3.8'

services:
  # Main Streamlit Application
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-chatbot
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-faiss}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K_RETRIEVAL=${TOP_K_RETRIEVAL:-3}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - PYTHONUNBUFFERED=1
    volumes:
      - ./vector_store:/app/vector_store
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - rag-network
    depends_on:
      - chroma
    labels:
      - "com.example.description=RAG PDF Chatbot"
      - "com.example.version=1.0.0"

  # Vector Database (Chroma) - Optional but recommended for persistence
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chroma-db
    ports:
      - "8000:8000"
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - CHROMA_TELEMETRY_IMPL=none
    volumes:
      - ./chroma_data:/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - rag-network

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - streamlit
    restart: unless-stopped
    networks:
      - rag-network
    profiles: ["production"]

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - rag-network
    profiles: ["monitoring"]

  # Log Aggregation (Optional)
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    restart: unless-stopped
    networks:
      - rag-network
    profiles: ["monitoring"]

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - rag-network
    profiles: ["monitoring"]

networks:
  rag-network:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  chroma_data:

# Usage:
# 
# Basic deployment (Streamlit + Chroma):
#   docker-compose up -d
#
# With monitoring:
#   docker-compose --profile monitoring up -d
#
# With production setup (Nginx):
#   docker-compose --profile production up -d
#
# View logs:
#   docker-compose logs -f streamlit
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
